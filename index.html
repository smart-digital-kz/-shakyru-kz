<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жасұлан & Альбина | VIP Шақыру</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <style>
        :root { --cream: #FCF9F5; --gold: #B8904D; --dark: #2c3e50; --white: #FFFFFF; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--cream); color: var(--dark); scroll-behavior: smooth; overflow-x: hidden; }
        
        .hero { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; 
            background: linear-gradient(rgba(252,249,245,0.7), rgba(252,249,245,0.7)), url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
        }
        .hero h1 { font-family: 'Great Vibes'; font-size: clamp(50px, 12vw, 90px); color: var(--gold); margin: 0; }
        .hero p { font-family: 'Cinzel'; letter-spacing: 4px; font-size: 1.2rem; }

        .section { padding: 60px 20px; text-align: center; max-width: 700px; margin: auto; }
        h2 { font-family: 'Cinzel'; color: var(--gold); font-size: 1.8rem; margin-bottom: 30px; }

        .info-card { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(184,144,77,0.2); }
        
        /* Карта терезесі */
        .map-container { width: 100%; height: 350px; border-radius: 15px; overflow: hidden; margin: 20px 0; border: 1px solid #ddd; }
        iframe { width: 100%; height: 100%; border: none; }

        .btn { 
            display: inline-block; padding: 15px 30px; border-radius: 50px; text-decoration: none; 
            color: #fff; font-weight: 600; transition: 0.3s; margin: 10px; background: var(--gold);
            box-shadow: 0 4px 15px rgba(184,144,77,0.3);
        }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }

        .timer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 30px; }
        .box { background: var(--white); padding: 15px; border-radius: 12px; border: 1px solid rgba(184,144,77,0.1); }
        .box span { display: block; font-size: 1.5rem; font-weight: bold; color: var(--gold); }

        @media(max-width: 500px) { .timer { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <section class="hero" data-aos="fade-in">
        <p>ТОЙҒА ШАҚЫРУ</p>
        <h1>Жасұлан & Альбина</h1>
        <p>25.05.2026</p>
    </section>

    <section class="section" data-aos="fade-up">
        <h2>Той салтанатына дейін:</h2>
        <div class="timer">
            <div class="box"><span id="d">00</span>Күн</div>
            <div class="box"><span id="h">00</span>Сағат</div>
            <div class="box"><span id="m">00</span>Мин</div>
            <div class="box"><span id="s">00</span>Сек</div>
        </div>
    </section>

    <section class="section" data-aos="fade-up">
        <h2>Мекен-жайымыз</h2>
        <div class="info-card">
            <h3>Palazzo Di Astana</h3>
            <p>Астана қаласы, Тұран даңғылы, 54</p>
            
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2505.516246416!2d71.3983!3d51.1086!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4245842f9e61db1d%3A0x86846146c641151!2sPalazzo%20Di%20Astana!5e0!3m2!1skk!2skz!4v1714320000000" allowfullscreen="" loading="lazy"></iframe>
            </div>

            <a class="btn" href="https://2gis.kz/astana/search/Palazzo%20Di%20Astana" target="_blank">📍 2GIS-ПЕН АШУ</a>
            <a class="btn" href="https://maps.app.goo.gl/9R6XhJ7f6sE6yR7S9" target="_blank">🗺️ GOOGLE MAPS</a>
        </div>
    </section>

    <section class="section" data-aos="fade-up">
        <h2>Жауабыңызды күтеміз</h2>
        <a class="btn" href="https://wa.me/77472465381?text=Сәлем! Мен тойға келемін" target="_blank">✅ ИӘ, КЕЛЕМІН</a>
        <a class="btn" style="background:#E88B8B;" href="https://wa.me/77472465381?text=Кешіріңіз, келе алмаймын" target="_blank">❌ КЕЛЕ АЛМАЙМЫН</a>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        AOS.init({ duration: 1000 });

        const weddingDate = new Date("2026-05-25T18:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const gap = weddingDate - now;
            document.getElementById("d").innerText = Math.floor(gap / (1000 * 60 * 60 * 24));
            document.getElementById("h").innerText = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("m").innerText = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("s").innerText = Math.floor((gap % (1000 * 60)) / 1000);
        }, 1000);
    </script>
</body>
</html>
