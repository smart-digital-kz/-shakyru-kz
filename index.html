<!DOCTYPE html><html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Жасұлан & Альбина | Premium Invite</title><link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet"><style>
:root{--cream:#FCF9F5;--gold:#B8904D;--pink:#E88B8B}
*{box-sizing:border-box}
body{margin:0;font-family:'Montserrat',sans-serif;background:var(--cream);color:#2b2b2b}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url('https://images.unsplash.com/photo-1519741497674-611481863552?w=1200') center/cover no-repeat;
}

.hero h1{
font-family:'Great Vibes';
font-size:clamp(3rem,10vw,6rem);
color:#fff;
margin:0;
}

.hero p{
color:#fff;
letter-spacing:2px;
margin-top:15px;
opactiy:.9
}

.section{padding:80px 20px;max-width:600px;margin:auto;text-align:center}
h2{font-family:'Cinzel';color:var(--gold);margin-bottom:30px}

.timer{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.box{background:#fff;padding:18px;border-radius:16px;box-shadow:0 8px 25px rgba(0,0,0,.05)}
.box span{font-size:20px;font-weight:600;color:var(--gold)}

.timeline{border-left:2px solid var(--gold);padding-left:15px;text-align:left}
.timeline div{margin:15px 0}

.colors{display:flex;justify-content:center;gap:15px;margin-top:15px}
.color{width:40px;height:40px;border-radius:50%}
.gold{background:#B8904D}
.beige{background:#F5E6D3}
.black{background:#000}

iframe{width:100%;height:280px;border:none;border-radius:12px}

.btn{display:block;margin:12px auto;padding:16px;border-radius:40px;text-decoration:none;color:#fff;font-weight:600;max-width:300px}
.btn-gold{background:var(--gold)}
.btn-pink{background:var(--pink)}

@media(max-width:500px){.timer{grid-template-columns:repeat(2,1fr)}}
</style></head>
<body><section class="hero" data-aos="zoom-out">
<h1>Жасұлан & Альбина</h1>
<p>Біздің ерекше күнімізге шақырамыз</p>
</section><section class="section" data-aos="fade-up">
<h2>Тойға дейін</h2>
<div class="timer">
<div class="box"><span id="d"></span><br>Күн</div>
<div class="box"><span id="h"></span><br>Сағат</div>
<div class="box"><span id="m"></span><br>Мин</div>
<div class="box"><span id="s"></span><br>Сек</div>
</div>
</section><section class="section" data-aos="fade-up">
<h2>Dress Code</h2>
<p>Классикалық стиль ұсынылады</p>
<div class="colors">
<div class="color gold"></div>
<div class="color beige"></div>
<div class="color black"></div>
</div>
</section><section class="section" data-aos="fade-up">
<h2>Бағдарлама</h2>
<div class="timeline">
<div>17:00 — Қонақтарды қарсы алу</div>
<div>18:00 — Той басталуы</div>
<div>19:30 — Негізгі бөлім</div>
<div>22:00 — Қорытынды</div>
</div>
</section><section class="section" data-aos="fade-up">
<h2>Мекенжай</h2>
<iframe src="https://www.google.com/maps?q=Palazzo%20Di%20Astana&output=embed"></iframe>
<a class="btn btn-gold" href="https://maps.google.com/?q=Palazzo+Di+Astana" target="_blank">Карта ашу</a>
</section><section class="section" data-aos="fade-up">
<h2>Қатысу</h2>
<a class="btn btn-gold" href="https://wa.me/77472465381?text=Мен тойға келемін" target="_blank">Иә, келемін</a>
<a class="btn btn-pink" href="https://wa.me/77472465381?text=Келе алмаймын" target="_blank">Келе алмаймын</a>
</section><script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script><script>
AOS.init({duration:1000,once:true});

const date=new Date("2026-08-26T18:00:00").getTime();
function update(){
let dff=date-Date.now();
if(dff<0){document.querySelectorAll('.box span').forEach(e=>e.innerText='00');return}

d.innerText=Math.floor(dff/(1000*60*60*24));
h.innerText=Math.floor((dff/(1000*60*60))%24);
m.innerText=Math.floor((dff/(1000*60))%60);
s.innerText=Math.floor((dff/1000)%60);
}
update();setInterval(update,1000);
</script></body>
</html>
