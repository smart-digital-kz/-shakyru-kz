<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жасұлан & Альбина</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background-color: #FCF9F5;
            color: #333;
            text-align: center;
        }
        .container { padding: 50px 20px; max-width: 500px; margin: auto; }
        h1 { color: #B8904D; font-size: 2.5rem; margin-bottom: 10px; }
        .date { letter-spacing: 3px; font-weight: bold; color: #888; }
        
        .timer {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }
        .box {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            min-width: 60px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .box span { display: block; font-size: 20px; font-weight: bold; color: #B8904D; }

        .btn {
            display: block;
            background: #B8904D;
            color: white;
            padding: 15px;
            margin: 10px auto;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            max-width: 250px;
        }
        .btn-wa { background: #25D366; }
        
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .map-placeholder {
            background: #eee;
            height: 200px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <p class="date">26 . 08 . 2026</p>
    <h1>Жасұлан & Альбина</h1>
    <p>Тойымыздың қадірлі қонағы болыңыз!</p>

    <div class="timer">
        <div class="box"><span id="d">00</span>күн</div>
        <div class="box"><span id="h">00</span>сағат</div>
        <div class="box"><span id="m">00</span>мин</div>
    </div>

    <div class="card">
        <h3>Мекенжайымыз</h3>
        <p>Palazzo Di Astana<br>Сығанақ көшесі, 38</p>
        <a href="https://2gis.kz/astana/geo/70000001032123519" class="btn">2GIS картамен ашу</a>
    </div>

    <div class="card" style="border: 1px solid #2E7D32;">
        <h3 style="color: #2E7D32;">Той Халал өтеді</h3>
        <p>Дастарханға алкоголь қойылмайды</p>
    </div>

    <div class="card">
        <h3>Жауап беру</h3>
        <button onclick="sendRSVP('Иә, барамын')" class="btn" style="border:none; width:100%;">Иә, барамын</button>
        <button onclick="sendRSVP('Келе алмаймын')" class="btn" style="background:#E88B8B; border:none; width:100%;">Келе алмаймын</button>
    </div>

    <br>
    <a href="https://wa.me/77472465381" class="btn btn-wa">WhatsApp-қа тілек жазу</a>
</div>

<script>
    // Timer
    const weddingDate = new Date("2026-08-26T18:00:00").getTime();
    function updateTimer() {
        const now = new Date().getTime();
        const diff = weddingDate - now;
        if (diff < 0) return;
        document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('h').innerText = Math.floor((diff / (1000 * 60 * 60)) % 24);
        document.getElementById('m').innerText = Math.floor((diff / (1000 * 60)) % 60);
    }
    setInterval(updateTimer, 1000);
    updateTimer();

    // RSVP
    function sendRSVP(answer) {
        const name = new URLSearchParams(window.location.search).get('name') || 'Қонақ';
        const msg = encodeURIComponent(`Сәлеметсіз бе! Мен, ${name}. Жауабым: ${answer}`);
        window.location.href = `https://wa.me/77472465381?text=${msg}`;
    }
</script>

</body>
</html>
