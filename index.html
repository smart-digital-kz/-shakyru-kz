<!DOCTYPE html><html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Жасұлан & Альбина | Wedding Invitation</title><link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>
:root{--cream:#FCF9F5;--gold:#B8904D;--pink:#E88B8B;--dark:#1a1a1a}
*{box-sizing:border-box}
body{margin:0;font-family:'Montserrat',sans-serif;background:var(--cream);color:var(--dark)}

.hero{
height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;
background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=1200') center/cover no-repeat;
}
.hero h1{font-family:'Great Vibes';font-size:clamp(3rem,10vw,6rem);color:#fff;margin:0}
.hero p{color:#fff;letter-spacing:2px;margin-top:10px}

.section{padding:80px 20px;max-width:600px;margin:auto;text-align:center}
h2{font-family:'Cinzel';color:var(--gold)}

.timer{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.box{background:#fff;padding:18px;border-radius:16px;box-shadow:0 8px 25px rgba(0,0,0,.05)}
.box span{font-size:20px;font-weight:600;color:var(--gold)}

.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.gallery img{width:100%;height:200px;object-fit:cover;border-radius:12px}

.btn{display:block;margin:12px auto;padding:16px;border-radius:40px;text-decoration:none;color:#fff;font-weight:600;max-width:300px}
.gold{background:var(--gold)}
.pink{background:var(--pink)}

.controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;width:90%;max-width:400px}
.fbtn{flex:1;padding:14px;border-radius:40px;color:#fff;border:none;font-weight:600}

iframe{width:100%;height:280px;border:none;border-radius:12px}

footer{padding:80px 20px 120px;text-align:center;opacity:.6}
</style></head>
<body><audio id="audio" preload="none" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5f6cdb0b60.mp3">
</audio><section class="hero">
<div>
<h1>Жасұлан & Альбина</h1>
<p id="guest">Қадірлі қонақ</p>
</div>
</section><section class="section">
<h2>Тойға дейін</h2>
<div class="timer">
<div class="box"><span id="d"></span><br>Күн</div>
<div class="box"><span id="h"></span><br>Сағат</div>
<div class="box"><span id="m"></span><br>Мин</div>
<div class="box"><span id="s"></span><br>Сек</div>
</div>
</section><section class="section">
<h2>Мекенжай</h2>
<iframe src="https://www.google.com/maps?q=Palazzo%20Di%20Astana&output=embed"></iframe>
<a class="btn gold" href="https://2gis.kz/astana/geo/70000001032123519" target="_blank">Карта ашу</a>
</section><section class="section">
<h2>Галерея</h2>
<div class="gallery">
<img loading="lazy" src="https://images.unsplash.com/photo-1519741497674-611481863552?w=500">
<img loading="lazy" src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?w=500">
</div>
</section><section class="section">
<h2>Той Халал өтеді</h2>
<img width="90" src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Halal_logo.svg/600px-Halal_logo.svg.png">
</section><section class="section">
<h2>Қатысу</h2>
<button class="btn gold" onclick="rsvp('Иә, барамын')">Иә, барамын</button>
<button class="btn pink" onclick="rsvp('Келе алмаймын')">Келе алмаймын</button>
</section><footer>
<p>Сүйіспеншілікпен жасалған</p>
</footer><div class="controls">
<button class="fbtn gold" id="musicBtn" onclick="toggleMusic()">Музыка</button>
<button class="fbtn" style="background:#25D366" onclick="wish()">Тілек</button>
</div><script>
const name=new URLSearchParams(location.search).get('name')||'Қадірлі қонақ';
document.getElementById('guest').innerText=name+', сізді күтеміз!';

function rsvp(text){
const msg=encodeURIComponent(`Сәлеметсіз бе! Мен, ${name}. Жауабым: ${text}`);
window.open(`https://wa.me/77472465381?text=${msg}`,'_blank');
}

function wish(){
const msg=encodeURIComponent(`${name}: Құтты болсын!`);
window.open(`https://wa.me/77472465381?text=${msg}`,'_blank');
}

const audio=document.getElementById('audio');
let play=false;
function toggleMusic(){
if(!play){audio.play();musicBtn.innerText='Өшіру'}
else{audio.pause();musicBtn.innerText='Музыка'}
play=!play;
}

const date=new Date("2026-08-26T18:00:00").getTime();
function update(){
let dff=date-Date.now();
if(dff<0){document.querySelectorAll('.box span').forEach(e=>e.innerText='00');return}

d.innerText=Math.floor(dff/(1000*60*60*24));
h.innerText=Math.floor((dff/(1000*60*60))%24);
m.innerText=Math.floor((dff/(1000*60))%60);
s.innerText=Math.floor((dff/1000)%60);
}
update();setInterval(update,1000);
</script></body>
</html>
,
